<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Sprite Preview</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      font-family: "Segoe UI", sans-serif;
      color: #ffffff;
      overflow: auto;
    }

    .preview {
      text-align: center;
      display: grid;
      gap: 14px;
      justify-items: center;
      align-content: start;
      padding: 16px 12px 28px;
      min-height: 100%;
    }

    .sprite {
      width: 32px;
      height: 32px;
      background-image: url("assets/Cat Sprite Sheet.png");
      background-repeat: no-repeat;
      background-position: 0 0;
      image-rendering: pixelated;
      transform: scale(8);
      transform-origin: center;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
    }

    .label {
      margin-top: 140px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="preview">
    <div class="sprite" id="sprite" aria-label="First row animated cat sprite"></div>
    <div class="label" id="label">Row 1 loop</div>
  </div>

  <script>
    const sprite = document.getElementById("sprite");
    const label = document.getElementById("label");

    // Sheet is 256x320 with 32x32 cells.
    const frameWidth = 32;
    const frameHeight = 32;

    // User-provided row data (rows shown here are 1-indexed).
    // 1-4,7 => 4 frames | 5,6,10 => 8 frames | 8 => 6 frames | 9 => 7 frames
    const rowFrameCounts = [4, 4, 4, 4, 8, 8, 4, 6, 7, 8];
    const rowNames = [
      "idle",
      "look-side",
      "lick-paw",
      "scratch-ears",
      "walk",
      "run",
      "sleep",
      "paw-object",
      "pounce",
      "burp",
    ];

    let activeRowIndex = 0; // Row 1 by default (0-based index).
    let speedMs = 180;
    let frame = 0;
    let timerId;

    function paintFrame() {
      const framesInRow = rowFrameCounts[activeRowIndex];
      const x = -(frame * frameWidth);
      const y = -(activeRowIndex * frameHeight);
      sprite.style.backgroundPosition = `${x}px ${y}px`;
      label.textContent = `${rowNames[activeRowIndex]} (row ${activeRowIndex + 1}, ${framesInRow} frames)`;
    }

    function restartLoop() {
      const framesInRow = rowFrameCounts[activeRowIndex];
      clearInterval(timerId);
      timerId = setInterval(() => {
        frame = (frame + 1) % framesInRow;
        paintFrame();
      }, speedMs);
    }

    // Optional quick row switching while testing.
    // ArrowUp / ArrowDown moves through rows 1..10.
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowDown") {
        activeRowIndex = (activeRowIndex + 1) % rowFrameCounts.length;
      } else if (event.key === "ArrowUp") {
        activeRowIndex = (activeRowIndex - 1 + rowFrameCounts.length) % rowFrameCounts.length;
      } else {
        return;
      }

      frame = 0;
      paintFrame();
      restartLoop();
    });

    paintFrame();
    restartLoop();
  </script>
</body>
</html>
