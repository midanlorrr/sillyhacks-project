<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Sprite Preview</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      font-family: "Segoe UI", sans-serif;
      color: #ffffff;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .preview {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .sprite {
      width: 32px;
      height: 32px;
      background-image: url("assets/Cat Sprite Sheet.png");
      background-repeat: no-repeat;
      background-position: 0 0;
      image-rendering: pixelated;
      transform: scale(8);
      transform-origin: center;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
    }

  </style>
</head>
<body>
  <div class="preview">
    <div class="sprite" id="sprite" aria-label="First row animated cat sprite"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
