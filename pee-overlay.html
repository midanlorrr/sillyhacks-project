<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const drops = [];
    const YELLOW = 'rgba(255, 220, 0, ';
    const params = new URLSearchParams(window.location.search);

    const qx = Number(params.get('x'));
    const qy = Number(params.get('y'));
    const ox = Number.isFinite(qx)
      ? Math.max(0, Math.min(canvas.width, qx))
      : canvas.width * 0.75;
    const oy = Number.isFinite(qy)
      ? Math.max(0, Math.min(canvas.height, qy))
      : canvas.height * 0.72;

    for (let i = 0; i < 55; i++) {
      const angle = (Math.random() * 100 - 50) * Math.PI / 180; // spray around source
      const speed = 2 + Math.random() * 5;
      drops.push({
        x: ox, y: oy,
        vx: Math.cos(angle) * speed,
        vy: -Math.sin(angle) * speed + (Math.random() * 1.4 - 0.6),
        r: 2 + Math.random() * 4,
        alpha: 0.85 + Math.random() * 0.15,
        fade: 0.008 + Math.random() * 0.012,
        landed: false,
        landY: 0,
      });
    }

    // Puddle splats that accumulate on screen
    const splats = [];

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw splats
      for (const s of splats) {
        ctx.beginPath();
        ctx.ellipse(s.x, s.y, s.rx, s.ry, 0, 0, Math.PI * 2);
        ctx.fillStyle = YELLOW + s.alpha + ')';
        ctx.fill();
      }

      // Animate drops
      let anyAlive = false;
      for (const d of drops) {
        if (d.alpha <= 0) continue;
        anyAlive = true;

        if (!d.landed) {
          d.vy += 0.35; // gravity
          d.x  += d.vx;
          d.y  += d.vy;

          if (d.y >= canvas.height * 0.88) {
            d.landed = true;
            d.landY  = d.y;
            splats.push({ x: d.x, y: d.landY, rx: d.r * 2.5, ry: d.r * 0.9, alpha: 0.55 });
          }

          ctx.beginPath();
          ctx.ellipse(d.x, d.y, d.r * 0.7, d.r, Math.atan2(d.vy, d.vx), 0, Math.PI * 2);
          ctx.fillStyle = YELLOW + d.alpha + ')';
          ctx.fill();
        } else {
          // Slowly fade the splat
          d.alpha -= d.fade * 0.5;
        }
      }

      // Fade splats out too
      for (const s of splats) {
        s.alpha -= 0.002;
      }

      if (anyAlive || splats.some(s => s.alpha > 0)) {
        requestAnimationFrame(tick);
      }
    }

    tick();
  </script>
</body>
</html>
